<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pesto – Бронирование столика</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/pesto_main.css">
  <link rel="stylesheet" href="/static/pesto_booking.css">
</head>
<body>

  <div id="booking-app">
    <header class="top-nav">
      <div class="nav-center">
        <a href="/">Главная</a>
        <a href="/menu">Меню</a>
        <a href="/booking" class="active-link">Бронирование</a>
        <a href="/history" v-show="isLoggedIn">История</a>
      </div>

      <div class="nav-right">
        <a href="/login" class="nav-btn" v-show="!isLoggedIn">Войти</a>
        <a href="/register" class="nav-btn" v-show="!isLoggedIn">Регистрация</a>
        <a href="/logout" class="nav-btn" v-show="isLoggedIn">Выйти</a>
      </div>
    </header>

    <main class="booking-page">
      <div class="container">
        <h1 class="booking-title">Бронирование столика</h1>
        <p class="booking-page-subtitle">
          Выберите дату, время и количество гостей. Мы предложим вам свободные столики.
        </p>

        <div v-if="errorMessage" style="color:#b00020; margin-bottom:10px; text-align:center;">
          {{ errorMessage }}
        </div>
        <div v-if="successMessage" style="color:#2e7d32; margin-bottom:10px; text-align:center;">
          {{ successMessage }}
        </div>

        <div class="booking-wrapper">
          <form class="booking-card" @submit.prevent="onCheckTables">
            <div class="booking-grid">

              <div>
                <label for="booking-date">Дата</label>
                <input type="date" id="booking-date" v-model="date" required>
              </div>

              <div>
                <label for="booking-time-start">Время начала</label>
                <input type="time" id="booking-time-start" v-model="timeStart" required>
              </div>

              <div>
                <label for="booking-time-end">Время окончания</label>
                <input type="time" id="booking-time-end" v-model="timeEnd" required>
              </div>

              <div>
                <label for="booking-people">Гостей</label>
                <input
                  type="number"
                  id="booking-people"
                  min="1"
                  v-model.number="guests"
                  placeholder="Например, 2"
                  required
                >
              </div>

              <div class="full-width">
                <label for="booking-request">Комментарий к брони</label>
                <textarea
                  id="booking-request"
                  v-model="comment"
                  placeholder="Пожелания по столу, повод, аллергии и т.д."
                ></textarea>
              </div>

            </div>

            <button type="submit" class="booking-submit" :disabled="checkLoading">
              {{ checkLoading ? "Ищем свободные столики..." : "Показать свободные столики" }}
            </button>
          </form>
        </div>

        <div class="booking-wrapper" style="margin-top:30px;" v-if="freeTables.length">
          <div class="booking-card" style="margin-top:10px;">
            <h2 style="text-align:center;">Выберите столик</h2>

            <div style="margin:15px 0;">
              <label
                v-for="t in freeTables"
                :key="t.id"
                style="display:block; margin-bottom:8px; cursor:pointer;"
              >
                <input
                  type="radio"
                  name="table_id"
                  :value="t.id"
                  v-model="selectedTableId"
                >
                Столик №{{ t.table_number }} • мест: {{ t.seats }}
              </label>
            </div>

            <button
              type="button"
              class="booking-submit"
              @click="onConfirmBooking"
              :disabled="confirmLoading || !selectedTableId"
            >
              {{ confirmLoading ? "Создаём бронь..." : "Подтвердить бронь" }}
            </button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const isLoggedIn = ref(false);

        const date = ref("");
        const timeStart = ref("");
        const timeEnd = ref("");
        const guests = ref(1);
        const comment = ref("");

        const errorMessage = ref("");
        const successMessage = ref("");

        const freeTables = ref([]);
        const bookingData = ref(null);
        const selectedTableId = ref(null);

        const checkLoading = ref(false);
        const confirmLoading = ref(false);

        function getCookie(name) {
          const value = document.cookie
            .split("; ")
            .find(row => row.startsWith(name + "="));
          return value ? value.split("=")[1] : null;
        }

        onMounted(() => {
          isLoggedIn.value = getCookie("logged_in") === "1";
        });

        const onCheckTables = async () => {
          errorMessage.value = "";
          successMessage.value = "";
          freeTables.value = [];
          selectedTableId.value = null;
          bookingData.value = null;
          checkLoading.value = true;

          try {
            const fd = new FormData();
            fd.append("date", date.value);
            fd.append("time_start", timeStart.value);
            fd.append("time_end", timeEnd.value);
            fd.append("guests", guests.value || 1);
            fd.append("comment", comment.value || "");

            const resp = await fetch("/booking/check", { method: "POST", body: fd });

            let data = {};
            try {
              data = await resp.json();
            } catch (_) {
              throw new Error("Некорректный ответ от сервера.");
            }

            if (data.error) {
              errorMessage.value = data.error;
              return;
            }

            if (!data.free_tables || !data.free_tables.length) {
              errorMessage.value = "Свободных столиков не найдено.";
              return;
            }

            freeTables.value = data.free_tables;
            bookingData.value = data.data || null;

          } catch (e) {
            console.error(e);
            errorMessage.value = e.message || "Ошибка при поиске столиков.";
          } finally {
            checkLoading.value = false;
          }
        };

        const onConfirmBooking = async () => {
          errorMessage.value = "";
          successMessage.value = "";

          if (!bookingData.value) {
            errorMessage.value = "Сначала найдите свободный столик.";
            return;
          }
          if (!selectedTableId.value) {
            errorMessage.value = "Выберите столик.";
            return;
          }

          confirmLoading.value = true;

          try {
            const fd = new FormData();
            fd.append("date", bookingData.value.date);
            fd.append("time_start", bookingData.value.time_start);
            fd.append("time_end", bookingData.value.time_end);
            fd.append("guests", bookingData.value.guests);
            fd.append("comment", bookingData.value.comment || "");
            fd.append("table_id", selectedTableId.value);

            const resp = await fetch("/booking/confirm", { method: "POST", body: fd });

            let data = {};
            try {
              data = await resp.json();
            } catch (_) {
              throw new Error("Некорректный ответ от сервера.");
            }

            if (data.error) {
              errorMessage.value = data.error;
              return;
            }

            if (data.success) {
              successMessage.value = data.message || "Бронь успешно создана.";
              freeTables.value = [];
              selectedTableId.value = null;
            }

          } catch (e) {
            console.error(e);
            errorMessage.value = e.message || "Ошибка при подтверждении брони.";
          } finally {
            confirmLoading.value = false;
          }
        };

        return {
          isLoggedIn,
          date,
          timeStart,
          timeEnd,
          guests,
          comment,
          errorMessage,
          successMessage,
          freeTables,
          bookingData,
          selectedTableId,
          checkLoading,
          confirmLoading,
          onCheckTables,
          onConfirmBooking
        };
      }
    }).mount("#booking-app");
  </script>

</body>
</html>
