<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pesto – Бронирование столика</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap"
    rel="stylesheet"
  >
    <link rel="stylesheet" href="/static/pesto_main.css">
  <link rel="stylesheet" href="/static/pesto_booking.css">
</head>
<body>

  <header class="top-nav">
    <div class="nav-center">
      <a href="/">Главная</a>
      <a href="/menu">Меню</a>
      <a href="/booking" class="active-link">Бронирование</a>
      <a href="/history">История</a>
    </div>

    <div class="nav-right">
      <a href="/login" class="nav-btn">Войти</a>
      <a href="/register" class="nav-btn">Регистрация</a>
      <a href="/logout" class="nav-btn">Выйти</a>
    </div>
  </header>

  <main class="booking-page">
    <div class="container">
      <h1 class="booking-title">Бронирование столика</h1>
      <p class="booking-page-subtitle">
        Выберите дату, время и количество гостей. Мы предложим вам свободные столики.
      </p>

      <div class="booking-wrapper">
        <form class="booking-card" action="/booking/check" method="post">
          <div class="booking-grid">

            <div>
              <label for="booking-date">Дата</label>
              <input type="date" id="booking-date" name="date" required>
            </div>

            <div>
              <label for="booking-time-start">Время начала</label>
              <input type="time" id="booking-time-start" name="time_start" required>
            </div>

            <div>
              <label for="booking-time-end">Время окончания</label>
              <input type="time" id="booking-time-end" name="time_end" required>
            </div>

            <div>
              <label for="booking-people">Гостей</label>
              <input
                type="number"
                id="booking-people"
                name="guests"
                min="1"
                placeholder="Например, 2"
                required
              >
            </div>

            <div class="full-width">
              <label for="booking-request">Комментарий к брони</label>
              <textarea
                id="booking-request"
                name="comment"
                placeholder="Пожелания по столу, повод, аллергии и т.д."
              ></textarea>
            </div>

          </div>

          <button type="submit" class="booking-submit">
            Показать свободные столики
          </button>
        </form>
      </div>
    <div class="booking-wrapper" style="margin-top: 30px;">
      <div class="booking-card">
        
        <h2 style="text-align:center;">Выберите столик</h2>

        <div style="margin: 15px 0;">
          <label style="display:block; margin-bottom:8px;">
            <input type="radio" name="table_id">
            Столик №1 • мест: 4
          </label>

          <label style="display:block; margin-bottom:8px;">
            <input type="radio" name="table_id">
            Столик №2 • мест: 2
          </label>
        </div>

        <button type="submit" class="booking-submit">
          Подтвердить бронь
        </button>
      </div>
    
    </div>
    </div>
  </main>

</body>
</html>
