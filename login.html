<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pesto – Вход</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="/static/pesto_main.css">
  <link rel="stylesheet" href="/static/auth.css">
</head>

<body class="page-login">
  <main class="page login-page">
    <div class="container" id="login-app">
      <h1 class="title">Вход в аккаунт</h1>
      <p class="subtitle">Введите свои данные, чтобы продолжить.</p>

      <div class="wrapper">
        <form class="card" @submit.prevent="onSubmit">
          <div class="auth-error" v-if="errorMessage">
            {{ errorMessage }}
          </div>

          <div class="grid">
            <div class="full-width">
              <label for="login-email">E-mail</label>
              <input
                type="email"
                id="login-email"
                name="email"
                placeholder="example@mail.ru"
                v-model="email"
                required
              >
            </div>

            <div class="full-width">
              <label for="login-password">Пароль</label>
              <input
                type="password"
                id="login-password"
                name="password"
                placeholder="Введите пароль"
                v-model="password"
                required
              >
            </div>
          </div>

          <button
            type="submit"
            class="submit"
            :disabled="loading"
          >
            {{ loading ? "Входим..." : "Войти" }}
          </button>

          <p class="bottom-text">
            Нет аккаунта?
            <a href="/register" class="logreg-link">Зарегистрироваться</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const email = ref("");
        const password = ref("");
        const errorMessage = ref("");
        const loading = ref(false);

        onMounted(() => {
          const params = new URLSearchParams(window.location.search);
          const error = params.get("error");

          if (!error) return;

          if (error === "wrong_credentials") {
            errorMessage.value = "Неверный e-mail или пароль";
          } else if (error === "password_mismatch") {
            errorMessage.value = "Пароли не совпадают";
          } else if (error === "email_exists") {
            errorMessage.value = "Пользователь с таким e-mail уже существует";
          } else {
            errorMessage.value = "Произошла ошибка";
          }
        });

        const onSubmit = async () => {
          errorMessage.value = "";
          loading.value = true;

          try {
            const formData = new FormData();
            formData.append("email", email.value);
            formData.append("password", password.value);

            const resp = await fetch("/login", {
              method: "POST",
              body: formData,
            });

            if (!resp.ok) {
              let data = {};
              try {
                data = await resp.json();
              } catch (_) {}

              if (data && data.error) {
                errorMessage.value = data.error;
              } else {
                errorMessage.value = "Ошибка входа. Попробуйте ещё раз.";
              }
              return;
            }

            const finalUrl = resp.url || "/";
            window.location.href = finalUrl;
          } catch (e) {
            console.error(e);
            errorMessage.value = "Не удалось отправить запрос. Проверьте соединение.";
          } finally {
            loading.value = false;
          }
        };

        return {
          email,
          password,
          errorMessage,
          loading,
          onSubmit,
        };
      }
    }).mount("#login-app");
  </script>
</body>
</html>
