<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pesto – Регистрация</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="/static/pesto_main.css">
  <link rel="stylesheet" href="/static/auth.css">
</head>
<body class="page-register">

  <main class="page register-page">
    <div class="container">
      <h1 class="title">Регистрация</h1>
      <p class="subtitle">
        Создайте аккаунт, чтобы бронировать столики онлайн.
      </p>

      <div class="wrapper">
        <form class="card" action="/register" method="post">

          <div class="grid">

            <div>
              <label for="reg-name">Имя</label>
              <input
                type="text"
                id="reg-name"
                name="name"
                placeholder="Как к вам обращаться?"
                autocomplete="name"
                required
              >
            </div>

            <div>
              <label for="reg-phone">Телефон</label>
              <input
                type="tel"
                id="reg-phone"
                name="phone"
                placeholder="+7 (___) ___-__-__"
                autocomplete="tel"
                required
              >
            </div>

            <div class="full-width">
              <label for="reg-email">E-mail</label>
              <input
                type="email"
                id="reg-email"
                name="email"
                placeholder="example@mail.ru"
                autocomplete="email"
                required
              >
            </div>

            <div>
              <label for="reg-password">Пароль</label>
              <input
                type="password"
                id="reg-password"
                name="password"
                placeholder="Придумайте пароль"
                autocomplete="new-password"
                required
              >
            </div>

            <div>
              <label for="reg-password2">Повторите пароль</label>
              <input
                type="password"
                id="reg-password2"
                name="password_confirm"
                placeholder="Повторите пароль"
                autocomplete="new-password"
                required
              >
            </div>

          </div>

          <button type="submit" class="submit">
            Зарегистрироваться
          </button>

          <p class="bottom-text">
            Уже есть аккаунт?
            <a href="/login" class="logreg-link">Войти</a>
          </p>

        </form>
      </div>
    </div>
  </main>

</body>
</html>
